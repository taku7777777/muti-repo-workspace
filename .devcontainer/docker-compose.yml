# Boundary topology — two "caged" cells (worker, orchestrator) split from the
# original single Phase-0/1 coder, plus the egress gateway sidecar and the
# Phase-2 publish broker. See the M1 topology comment below `name:` for the
# 4-service breakdown; this header covers the network-layer reasoning that
# still applies to BOTH cages unchanged.
#
# EGRESS VARIANT: Approach A — an EXPLICIT Squid forward-proxy sidecar, with
# both cages confined to an `internal: true` network. This was judged the most
# robust option in the architecture review, for reasons worth stating at the
# boundary:
#
#   * ZERO NET_ADMIN anywhere in the compose (User Decision 2). Both cages drop
#     ALL caps; Squid is an ordinary userspace listener. There is no in-workload
#     firewall to self-escalate against.
#   * Domain-level allowlisting over the cleartext CONNECT host — NO TLS
#     termination, NO SSL-bump, NO CA installed in either cage. (A transparent
#     gateway would only see the TLS SNI, which TLS 1.3 ECH can hide.)
#   * FAIL-CLOSED BY TOPOLOGY: both cages are attached ONLY to `caged`
#     (internal: true) which Docker creates with no route to the host/internet.
#     A tool that ignores HTTP(S)_PROXY has nowhere to send its packets — it
#     breaks, nothing escapes. Honoring the proxy is a usability property here,
#     not the security property.
#   * Neither cage needs external DNS at all (the proxy resolves names), which
#     closes the DNS-tunnel exfil vector (anthropics/claude-code#36907) by
#     construction.
#
# The transparent NET_ADMIN gateway (Approach B) is deliberately NOT built here;
# it is the documented fallback only if a future tool cannot honor an explicit
# proxy (see docs/devcontainer-phase0.md).

name: mrw-phase0

# M1 topology — 4 services replacing the single Phase-0/1 `coder` cage:
#   worker        write:code x egress:anthropic-only. Executes implement/fix/test
#                 steps over a typed RPC socket. Holds NO broker socket.
#   orchestrator  the trusted-er judgment plane. Worktrees mounted :ro at the
#                 MOUNT level; holds the ONLY broker socket; drives the worker
#                 via the worker-sock RPC. This is the human's interactive surface.
#   broker        unchanged — the ONLY component that can push (see below).
#   egress-proxy  unchanged — the ONLY path either cage has to the internet.
# The worker and orchestrator share one image (coder.Dockerfile) but never share
# a writable mount: the split is enforced by which named volumes/binds each
# service lists, not by anything inside the image.
#
# M3 adds a 5th, OPTIONAL service:
#   reviewer      caged, egress:anthropic-only (shared allowlist). Advisory-only
#                 consult the broker may make before the human gate — never
#                 depended-on, never load-bearing (see the `reviewer` and `broker`
#                 service comments below, and broker/src/reviewer.ts).
#
# Thread B (docs/browser-approval.md) adds a 6th, OPTIONAL service:
#   serve         token-less browser-approval renderer. Profile-gated
#                 (`profiles: ["serve"]` — never started by a plain `up -d`,
#                 only `mrw serve up`). Talks to the broker over a NEW unix
#                 socket (`approve-sock`, shared ONLY with `broker` — see
#                 both services' comments below); never sees
#                 BROKER_GITHUB_TOKEN and cannot push. Publishes
#                 127.0.0.1:<port> on the host for the browser to reach; no
#                 cage (`worker`/`orchestrator`/`reviewer`, all on `caged`)
#                 has a route to it.

services:
  # --------------------------------------------------------------------------
  # worker: write:code x egress:anthropic-only cell. It holds NO broker socket —
  # it cannot even REQUEST a publish, let alone perform one. Its daemon
  # (npm run workerd) executes implement/fix/test steps on behalf of the
  # orchestrator, received over the typed worker-sock RPC. Mounts are minimized
  # so the harness/spine SOURCE is not writable from inside this cage: only
  # `tasks/` (the worktrees a ticket's code changes land in) is rw.
  # --------------------------------------------------------------------------
  worker:
    build:
      context: ..
      dockerfile: .devcontainer/coder.Dockerfile
    user: node
    working_dir: /workspaces/muti-repo-workspace
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - caged
      - telemetry
    environment:
      # Usability: point every proxy-aware tool at the gateway. Both cases,
      # because Unix tools read them inconsistently.
      HTTP_PROXY: http://egress-proxy:3128
      HTTPS_PROXY: http://egress-proxy:3128
      http_proxy: http://egress-proxy:3128
      https_proxy: http://egress-proxy:3128
      # Never proxy loopback, the proxy's own service name, or the telemetry
      # collector — OTLP export must go DIRECT over `telemetry`, never
      # through Squid (which would CONNECT-reject a non-allowlisted host).
      NO_PROXY: localhost,127.0.0.1,::1,egress-proxy,otel-collector
      no_proxy: localhost,127.0.0.1,::1,egress-proxy,otel-collector
      # Keep a locked build from phoning home to a not-yet-allowlisted host.
      DISABLE_AUTOUPDATER: "1"
      CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
      # Per-ticket OTEL telemetry (docs/devcontainer-status.md item 10): the
      # `telemetry` network (mrw-telemetry, external, internal-only — see the
      # networks: block below) reaches ONLY the monitoring stack's
      # otel-collector, never the internet. MRW_TELEMETRY=0 disables export
      # entirely; OTEL_RESOURCE_ATTRIBUTES itself is NOT set here — every
      # session composes it from its own validated ticket at call time (see
      # harness/src/telemetry.ts), never from a static/forwarded env value.
      CLAUDE_CODE_ENABLE_TELEMETRY: ${MRW_TELEMETRY:-1}
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE: cumulative
      OTEL_LOG_USER_PROMPTS: "1"
      OTEL_LOG_TOOL_DETAILS: "1"
      MRW_WORK_TYPE: ${MRW_WORK_TYPE:-feature}
      # There is no postCreate.sh in this service (command below runs `npm ci`
      # directly), so npm must be told about the proxy via env at startup —
      # postCreate's `npm config set proxy` step doesn't run here.
      npm_config_proxy: http://egress-proxy:3128
      npm_config_https_proxy: http://egress-proxy:3128
      # The workerd daemon's RPC socket — shared with the orchestrator via the
      # `worker-sock` NAMED VOLUME (a host-path bind of a unix socket does NOT
      # traverse the container boundary on Docker Desktop for macOS).
      WORKERD_SOCKET_PATH: /run/worker/workerd.sock
      # The harness executes from a container-local copy (/home/node/harness-run,
      # see prepare-harness-run.sh), so its module-path-based workspace-root
      # resolution must be pinned back to the real mount explicitly.
      MRW_WORKSPACE_ROOT: /workspaces/muti-repo-workspace
      # Test command the daemon spawns for run_tests — stays in the daemon's OWN
      # env (not an RPC field), so an injected orchestrator LLM cannot smuggle an
      # arbitrary shell command through the wire protocol. Null-value passthrough
      # like the credentials below: unset on the host = omitted from the container.
      TEST_COMMAND:
      # Anthropic auth — passed through from the HOST SHELL at `docker compose up`
      # time (see scripts/devcontainer-up.sh, which reads the macOS Keychain).
      # No env_file: the secret never exists as plaintext inside the worktree.
      # Null-value passthrough — a variable unset on the host is OMITTED from the
      # container env entirely (an empty string could shadow the other credential).
      # Set exactly one: CLAUDE_CODE_OAUTH_TOKEN (Pro/Max subscription, minted
      # with `claude setup-token`) or ANTHROPIC_API_KEY (pay-as-you-go).
      CLAUDE_CODE_OAUTH_TOKEN:
      ANTHROPIC_API_KEY:
    volumes:
      # The worktrees a ticket's implement/fix/test steps write into. This is
      # the ONLY rw surface in this cage. MRW_STATE_ROOT points repositories/
      # + tasks/ at an externalized state_root (config/workspace.json
      # `.state_root`); unset ⇒ `..` (the tool checkout), byte-identical to
      # the legacy layout (see scripts/devcontainer-up.sh).
      - ${MRW_STATE_ROOT:-..}/tasks:/workspaces/muti-repo-workspace/tasks
      # Origins are the clone --reference SOURCE (Phase 3) and must never be
      # worker-writable — mount them READ-ONLY. A prompt-injected worker cannot
      # corrupt the shared origin clones every ticket's worktrees derive from.
      - ${MRW_STATE_ROOT:-..}/repositories:/workspaces/muti-repo-workspace/repositories:ro
      # The harness/spine SOURCE — read-only. The worker executes the daemon,
      # it must not be able to rewrite the code that defines its own tool
      # posture (that would let an injected LLM re-arm itself with new tools).
      - ../harness:/workspaces/muti-repo-workspace/harness:ro
      - ../scripts:/workspaces/muti-repo-workspace/scripts:ro
      # The workerd RPC socket, shared with the orchestrator. NO broker-sock
      # here — see the service comment above.
      - worker-sock:/run/worker
    depends_on:
      egress-proxy:
        condition: service_healthy
    # No postCreate.sh for this service: copy the :ro harness source to
    # container-local disk + `npm ci` there (see prepare-harness-run.sh for why
    # a named volume over the :ro bind does NOT work — it initializes from the
    # host's darwin/uid-mismatched node_modules), then start the RPC daemon in
    # the foreground so the container's lifecycle IS the daemon's lifecycle.
    command: ["bash", "-lc", "bash /workspaces/muti-repo-workspace/scripts/prepare-harness-run.sh && cd /home/node/harness-run && exec npm run workerd"]
    # Ready = the RPC socket is actually listening, not merely "process started".
    # start_period is generous because `npm ci` through the proxy is slow on a
    # cold start (container-local node_modules survives restarts, not recreates).
    healthcheck:
      test: ["CMD-SHELL", "test -S /run/worker/workerd.sock || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 300s

  # --------------------------------------------------------------------------
  # orchestrator: the trusted-er judgment plane INSIDE the cage network. Runs
  # the coded spine plus read-only LLM sessions (PLAN/REVIEW). The worktrees
  # (and everything else under the workspace) are mounted :ro at the MOUNT
  # LEVEL — ONE fact is the boundary: worktrees, config, docs all readable,
  # nothing writable. It holds the ONLY broker socket (the only publish path)
  # and drives the worker's implement/fix/test steps via the typed worker-sock
  # RPC — it never edits code directly. This is the human's interactive surface
  # (see devcontainer.json): attach here to chat with the spine / answer gates.
  # --------------------------------------------------------------------------
  orchestrator:
    build:
      context: ..
      dockerfile: .devcontainer/coder.Dockerfile
    user: node
    working_dir: /workspaces/muti-repo-workspace
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - caged
      - telemetry
    environment:
      HTTP_PROXY: http://egress-proxy:3128
      HTTPS_PROXY: http://egress-proxy:3128
      http_proxy: http://egress-proxy:3128
      https_proxy: http://egress-proxy:3128
      NO_PROXY: localhost,127.0.0.1,::1,egress-proxy,otel-collector
      no_proxy: localhost,127.0.0.1,::1,egress-proxy,otel-collector
      DISABLE_AUTOUPDATER: "1"
      CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
      # Per-ticket OTEL telemetry — see the worker service's comment above
      # (same contract, same `telemetry` network, same self-composed
      # OTEL_RESOURCE_ATTRIBUTES per session via harness/src/telemetry.ts).
      CLAUDE_CODE_ENABLE_TELEMETRY: ${MRW_TELEMETRY:-1}
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE: cumulative
      OTEL_LOG_USER_PROMPTS: "1"
      OTEL_LOG_TOOL_DETAILS: "1"
      MRW_WORK_TYPE: ${MRW_WORK_TYPE:-feature}
      # The Phase 2 publish broker socket — the ONLY publish path, and the
      # orchestrator is the ONLY service that holds it (see docker-compose.yml
      # top-of-file topology comment). Shared via the `broker-sock` NAMED VOLUME.
      BROKER_SOCKET: /run/broker/publish.sock
      # The workerd RPC socket — how the orchestrator drives implement/fix/test
      # without ever writing to a worktree itself.
      WORKERD_SOCKET: /run/worker/workerd.sock
      # Spine ledger/notes state. Deliberately NOT under tasks/ (worker-writable,
      # so it cannot hold a trusted ledger) — its own rw named volume instead.
      MRW_STATE_DIR: /var/mrw/notes
      # The harness executes from a container-local copy (/home/node/harness-run,
      # see prepare-harness-run.sh), so its module-path-based workspace-root
      # resolution must be pinned back to the real (:ro) mount explicitly.
      MRW_WORKSPACE_ROOT: /workspaces/muti-repo-workspace
      # There is no guarantee postCreate.sh ran (exec-attach flow), so npm gets
      # its proxy config via env here too.
      npm_config_proxy: http://egress-proxy:3128
      npm_config_https_proxy: http://egress-proxy:3128
      # Anthropic auth — same passthrough contract as the worker.
      CLAUDE_CODE_OAUTH_TOKEN:
      ANTHROPIC_API_KEY:
    volumes:
      # The entire workspace, READ-ONLY. ONE :ro fact is the boundary —
      # worktrees, config, docs all readable, nothing writable. A prompt-
      # injected orchestrator LLM has no path to alter code, spine source, or
      # broker policy from inside this mount.
      - ..:/workspaces/muti-repo-workspace:ro
      # Nested state mounts, layered OVER the `..` mount above (a longer
      # container path wins): repositories/ + tasks/ actually live at
      # MRW_STATE_ROOT (see the worker service comment above). Unset ⇒ these
      # resolve to ../tasks and ../repositories — the SAME content already
      # covered by the `..` mount, so the overlay is a harmless no-op and
      # behavior is byte-identical to before this existed.
      - ${MRW_STATE_ROOT:-..}/tasks:/workspaces/muti-repo-workspace/tasks:ro
      - ${MRW_STATE_ROOT:-..}/repositories:/workspaces/muti-repo-workspace/repositories:ro
      # The spine's rw notes/ledger volume (see MRW_STATE_DIR above).
      - spine-notes:/var/mrw/notes
      # The ONLY service besides `broker` itself that holds this socket.
      - broker-sock:/run/broker
      # Shared with the worker — the RPC transport for implement/fix/test.
      - worker-sock:/run/worker
    depends_on:
      egress-proxy:
        condition: service_healthy
      broker:
        condition: service_healthy
      worker:
        condition: service_healthy
    stdin_open: true
    tty: true
    # Prepare the container-local harness copy (see prepare-harness-run.sh),
    # then idle for the dev container / spine REPL to attach to. A failed prep
    # is FAIL-VISIBLE but keeps the container alive so a human can exec in and
    # fix it (rerun the script) instead of crash-looping.
    command:
      [
        "bash",
        "-lc",
        "bash /workspaces/muti-repo-workspace/scripts/prepare-harness-run.sh || echo '[orchestrator] harness prep FAILED — rerun scripts/prepare-harness-run.sh manually'; exec sleep infinity",
      ]

  # --------------------------------------------------------------------------
  # broker: the Phase 2 publish broker — the ONLY component that can push. Its
  # OWN container (trust split): it is on `egress` (github access) and holds the
  # short-lived GitHub token in ITS env, NEVER the coder's. It reaches the coder
  # only through the shared `broker-sock` named volume (the typed socket). It
  # NEVER trusts the coder-writable worktree tree: policy comes from a
  # broker-OWNED, tool_home file bind-mounted read-only at BROKER_POLICY_FILE
  # (Phase 1: shared across workspaces, not baked into the image — see the
  # broker service's volumes: below), git config is
  # isolated, and every push goes to a broker-constructed, allowlist-validated URL
  # from a broker-private scratch repo. The human approval gate is on THIS
  # container's stdin — attach a terminal to answer it (see docs/devcontainer-phase2.md).
  # --------------------------------------------------------------------------
  broker:
    build:
      context: ..
      dockerfile: .devcontainer/broker.Dockerfile
    user: node
    working_dir: /broker
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - egress
    environment:
      # Short-lived, repo-scoped push token — in the BROKER's env only, delivered
      # by HOST-SHELL interpolation. Run `export BROKER_GITHUB_TOKEN=ghs_xxx` before
      # `docker compose up`. DO NOT put it in .devcontainer/.env — that file is the
      # coder's env_file, so a token there would leak into the caged coder (the one
      # component that must hold NO token). The broker has NO env_file for exactly
      # this reason.
      BROKER_GITHUB_TOKEN: ${BROKER_GITHUB_TOKEN:-}
      # TRUSTED policy — bind-mounted read-only at runtime from the active
      # config_dir's broker-policy.json (see the volumes: block below and
      # broker.Dockerfile), NOT read from the coder-writable /workspaces
      # mount. Phase 2: policy is now PER-WORKSPACE — MRW_CONFIG_DIR (set by
      # scripts/devcontainer-up.sh from config_dir(), or by the caller) picks
      # which workspace's broker-policy.json is bound; unset ⇒ ../config
      # (tool_home, byte-identical to Phase 1).
      BROKER_POLICY_FILE: /etc/mrw-broker/policy.json
      # The coder-writable worktrees the broker reads objects from (mounted :ro).
      # Overridable from the host shell — point at tasks/<TICKET>/repositories for
      # per-ticket work (NOTE: repositories/ is mounted :ro in the CODER, so a
      # coder-editable publish worktree must live under tasks/).
      BROKER_WORKTREES_DIR: ${BROKER_WORKTREES_DIR:-/workspaces/muti-repo-workspace/repositories}
      # The coder-writable tree the policy file must never live inside (F2 check).
      BROKER_CODER_TREE: /workspaces/muti-repo-workspace
      BROKER_SOCKET_PATH: /run/broker/publish.sock
      GIT_TERMINAL_PROMPT: "0"
      # M3 advisory reviewer — OPTIONAL. Null-value passthrough (bare key, no
      # inline default) — SAME contract as CLAUDE_CODE_OAUTH_TOKEN/
      # ANTHROPIC_API_KEY below in the worker/orchestrator blocks: unset on
      # the host means this var is OMITTED from the container entirely, so
      # `process.env.REVIEWER_SOCKET` reads undefined and
      # broker/src/reviewer.ts's maybeConsultReviewer() returns null
      # immediately — feature OFF, byte-identical to pre-M3 behavior. To
      # enable: `REVIEWER_SOCKET=/run/reviewer/review.sock scripts/devcontainer-up.sh`.
      REVIEWER_SOCKET:
      # Where the broker WRITES large diff files for the reviewer to read
      # (rw here, ro in the `reviewer` service below — see the `review-diffs`
      # named volume). Has a sensible default (unlike REVIEWER_SOCKET) because
      # writing here is harmless when the feature is off: nothing ever reads
      # the directory if REVIEWER_SOCKET is unset.
      REVIEWER_DIFF_DIR: /var/mrw/review-diffs
      # Thread B (docs/browser-approval.md): the approval socket the
      # OPTIONAL `mrw serve` browser UI connects to. Always-on is safe,
      # unlike REVIEWER_SOCKET's null-passthrough above — the `approve-sock`
      # volume (see this service's volumes: below) is shared ONLY with
      # `serve`, which is itself profile-gated and off by default; with
      # `serve` not running, nobody can connect to this socket at all, and
      # the existing TTY gate (approve.ts, this container's own stdin) is
      # completely unchanged — it races the socket, first decision wins
      # (broker/src/gate.ts). Set unconditionally here so `mrw serve up`
      # never needs a broker restart to pick it up.
      BROKER_APPROVAL_SOCKET: /run/approve/approve.sock
    # NOTE: intentionally NO `env_file: .env` here — the broker must not load the
    # coder's shared .env (which would also mean a token written there reaches the
    # coder). The token arrives via the `environment` interpolation above.
    volumes:
      # NOTE: the broker's source is NOT mounted — it is baked into the image at
      # build (see broker.Dockerfile). The host's broker/src lives inside the
      # coder-writable workspace tree, so mounting it (even :ro) would let a
      # tampered source execute with the token on the next broker restart.
      # The TRUSTED policy, however, is now bind-mounted (de-baked from the
      # image so editing it needs no rebuild) — read-only, from the active
      # config_dir (${MRW_CONFIG_DIR}, unset ⇒ ../config == tool_home, the
      # Phase 1 layout):
      - ${MRW_CONFIG_DIR:-../config}/broker-policy.json:/etc/mrw-broker/policy.json:ro
      # The shared socket named volume (also mounted in the coder).
      - broker-sock:/run/broker
      # M3: shared with the `reviewer` service. The broker holds the ONLY
      # socket client (its own outbound call, see reviewer.ts) — the socket
      # itself is opened by the reviewer process, not the broker.
      - reviewer-sock:/run/reviewer
      # M3: where the broker WRITES ground-truth diff files for the (OPTIONAL)
      # reviewer to read — rw here, ro in `reviewer` below.
      - review-diffs:/var/mrw/review-diffs
      # Thread B: the approval socket, shared ONLY with `serve` below — see
      # the BROKER_APPROVAL_SOCKET env comment above for why always-on is
      # safe. CRITICAL INVARIANT: this volume must NEVER be mounted into
      # `worker`, `orchestrator`, or `reviewer`. Any of those cages already
      # knows its OWN pending commit sha; if it also held this socket it
      # could self-approve its own publish — the entire point of the
      # sha-typed human gate is that the party proposing a change cannot
      # also be the party confirming it. `broker` and `serve` are the ONLY
      # two services allowed to list this volume anywhere in this file.
      - approve-sock:/run/approve
      # The coder-writable worktrees — READ-ONLY. The broker reads objects by sha;
      # it never writes here and never executes anything from here.
      - ..:/workspaces/muti-repo-workspace:ro
      # Nested state mounts, layered OVER the `..` mount above (a longer
      # container path wins) — see the orchestrator service's matching
      # comment. Unset MRW_STATE_ROOT ⇒ ../tasks + ../repositories, the same
      # content the `..` mount already provides: harmless, byte-identical.
      - ${MRW_STATE_ROOT:-..}/tasks:/workspaces/muti-repo-workspace/tasks:ro
      - ${MRW_STATE_ROOT:-..}/repositories:/workspaces/muti-repo-workspace/repositories:ro
      # BROKER_WORKTREES_DIR (env above) defaults to the container-internal
      # .../repositories path, unchanged — the nested mount above ensures
      # that path's CONTENT reflects the configured state_root.
    # The human approval gate reads/writes this container's stdio. Attach with
    # `docker compose attach broker` (or run it via `docker compose run`).
    stdin_open: true
    tty: true
    # Ready = the unix socket is actually listening (not merely "process started"),
    # so the coder's `depends_on: service_healthy` blocks until publish can connect,
    # and a broker that dies (e.g. the EACCES socket-dir bug) is detected.
    healthcheck:
      test: ["CMD-SHELL", "test -S /run/broker/publish.sock || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    # NOTE: no `depends_on: reviewer` here, deliberately. The M3 advisory
    # reviewer is OPTIONAL and fail-visible (broker/src/reviewer.ts): the
    # broker must start and serve publish requests even if the reviewer
    # image was never built, is unhealthy, or `docker compose stop reviewer`
    # was run — every consult failure degrades to "no verdict" at the human
    # gate, never to a blocked broker.
    command: ["npm", "start"]

  # --------------------------------------------------------------------------
  # reviewer: the M3 advisory reviewer — an OPTIONAL, ADVISORY-ONLY consult
  # the broker may make before the sha-typed human gate (see
  # broker/src/reviewer.ts, broker/src/approve.ts, and
  # docs/agent-orchestration.md's "Broker-side reviewer" section). It reads a
  # broker-rendered ground-truth diff (file, ro mount, or a small inline
  # payload) plus the coder's title/body (explicitly labeled UNTRUSTED in its
  # own prompt) and returns a {verdict, notes} pair — nothing it says can
  # force or block a publish. It holds NO GitHub token, NO git, NO gh, and no
  # workspace mount: everything it runs is baked into the image (see
  # reviewer.Dockerfile).
  # --------------------------------------------------------------------------
  reviewer:
    build:
      context: ..
      dockerfile: .devcontainer/reviewer.Dockerfile
    user: node
    working_dir: /reviewer
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    # Same `caged` network as worker/orchestrator — i.e. the SAME baked-in
    # allowlist (api.anthropic.com + registry.npmjs.org), enforced by the
    # SAME egress-proxy. This is a real, stated caveat: a reviewer-specific,
    # tighter allowlist (e.g. api.anthropic.com only, no npm) is Phase 4
    # work — see docs/egress-selfcheck-per-role.md's per-role manifest
    # design (`docker/egress/roles/reviewer.allow`, not yet built). Today the
    # reviewer is merely CONFINED to the same shared allowlist as every other
    # caged role, not given its own tighter one.
    networks:
      - caged
      - telemetry
    environment:
      HTTP_PROXY: http://egress-proxy:3128
      HTTPS_PROXY: http://egress-proxy:3128
      http_proxy: http://egress-proxy:3128
      https_proxy: http://egress-proxy:3128
      NO_PROXY: localhost,127.0.0.1,::1,egress-proxy,otel-collector
      no_proxy: localhost,127.0.0.1,::1,egress-proxy,otel-collector
      DISABLE_AUTOUPDATER: "1"
      CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
      # Per-ticket OTEL telemetry — see the worker service's comment above
      # (same contract; reviewer composes its own OTEL_RESOURCE_ATTRIBUTES
      # via reviewer/src/sdk.ts's reviewerTelemetryEnv(), role=reviewer).
      CLAUDE_CODE_ENABLE_TELEMETRY: ${MRW_TELEMETRY:-1}
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE: cumulative
      OTEL_LOG_USER_PROMPTS: "1"
      OTEL_LOG_TOOL_DETAILS: "1"
      MRW_WORK_TYPE: ${MRW_WORK_TYPE:-feature}
      REVIEWER_SOCKET_PATH: /run/reviewer/review.sock
      REVIEWER_DIFF_DIR: /var/mrw/review-diffs
      # Anthropic auth — same null-value-passthrough contract as the worker/
      # orchestrator: unset on the host means OMITTED from this container.
      CLAUDE_CODE_OAUTH_TOKEN:
      ANTHROPIC_API_KEY:
    volumes:
      # NOTE: the reviewer's source is NOT mounted — baked into the image at
      # build (see reviewer.Dockerfile), same supply-chain reasoning as the
      # broker's src.
      # Shared with the broker — the broker is the ONLY client; this process
      # opens (listens on) the socket.
      - reviewer-sock:/run/reviewer
      # The broker WRITES diff files here; the reviewer only ever READS them
      # — mounted read-only so a compromised reviewer session (it has no
      # tools, but defense in depth) cannot tamper with what a LATER request
      # would read.
      - review-diffs:/var/mrw/review-diffs:ro
    depends_on:
      egress-proxy:
        condition: service_healthy
    # Ready = the unix socket is actually listening. start_period is short
    # (unlike worker's 300s) because there is no `npm ci` at runtime here —
    # deps AND source are baked into the image at build time, so boot is
    # just "start the process and open a socket".
    healthcheck:
      test: ["CMD-SHELL", "test -S /run/reviewer/review.sock || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 60s
    command: ["npm", "start"]

  # --------------------------------------------------------------------------
  # serve: Thread B's token-less browser-approval renderer (docs/browser-
  # approval.md). OPTIONAL and profile-gated — `profiles: ["serve"]` means a
  # plain `docker compose up -d` NEVER starts it; only `mrw serve up`
  # (`--profile serve up -d --no-deps serve`) does, so infra-up's behavior is
  # byte-identical to before this service existed. It renders the SAME
  # ground-truth ApprovalView the broker's TTY gate already shows (relayed
  # over the `approve-sock` socket below) and lets the human type the short
  # sha into the page instead of the broker's stdin — but the broker NEVER
  # trusts what this container says: every submitted sha is re-verified
  # IN-PROCESS against the actual pending publish (broker/src/gate.ts)
  # before anything is pushed. A compromised `serve` can therefore at most
  # auto-approve the ONE exact sha already pending, to the SAME allowlist-
  # validated target the TTY gate would have pushed to — nothing else (see
  # docs/browser-approval.md's trust model for the full writeup and every
  # mitigation). It holds NO GitHub token, NO git, NO gh, and no workspace
  # or state_root mount — everything it runs is baked into the image at
  # build (serve.Dockerfile), same supply-chain posture as broker/reviewer.
  # Auth is a per-boot session token (SERVE_SESSION_TOKEN, minted fresh by
  # `mrw serve up`) plus CSRF + Host-header checks, all handled in-process
  # by the serve package itself — this container depends on nothing outside
  # itself for that.
  # --------------------------------------------------------------------------
  serve:
    profiles: ["serve"]
    build:
      context: ..
      dockerfile: .devcontainer/serve.Dockerfile
    user: node
    working_dir: /serve
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    # `approve` ONLY — see the networks: block below for why this must be a
    # non-internal bridge (the localhost port publish needs it), and why
    # that is an accepted, honestly-documented tradeoff. Deliberately NOT on
    # `caged`/`egress`/`telemetry`: no cage can reach this service, and it
    # talks to `broker` over the `approve-sock` named volume, not TCP, so it
    # does not need to share a network with `broker` either.
    networks:
      - approve
    environment:
      SERVE_APPROVAL_SOCKET: /run/approve/approve.sock
      SERVE_PORT: 7787
      # 0.0.0.0 inside the container is safe here — the localhost-ONLY
      # property comes from the host port publish below
      # (127.0.0.1:<port>:7787), not from the in-container bind address.
      SERVE_BIND: 0.0.0.0
      # Fail-closed IN-PROCESS (see the serve package's own env contract):
      # empty or short ⇒ serve logs and exit(1) rather than ever listening
      # unauthenticated. Deliberately NOT a compose-level
      # `${MRW_SERVE_TOKEN:?}` hard-require: interpolation runs for EVERY
      # service's environment block even when that service's profile is
      # inactive, so a `:?` here would make a plain `mrw infra-up` (no
      # `--profile serve`, MRW_SERVE_TOKEN never set) fail outright just
      # parsing this file. `mrw serve up` always mints a fresh crypto-random
      # token before invoking compose (see cli/mrw.mjs), so on the one path
      # that actually starts this service the variable is never empty in
      # practice — the in-process check is what makes that a GUARANTEE
      # rather than an assumption resting on the caller's good behavior.
      SERVE_SESSION_TOKEN: ${MRW_SERVE_TOKEN:-}
      SERVE_CONFIG_DIR: /etc/mrw-serve
      # NOTE: no HTTP_PROXY/HTTPS_PROXY, no CLAUDE_CODE_OAUTH_TOKEN/
      # ANTHROPIC_API_KEY, no BROKER_GITHUB_TOKEN here — `serve` reaches
      # nothing but the broker (via the socket volume below) and has no
      # LLM/egress surface of its own to gate.
    volumes:
      # The approval socket — see the `broker` service's matching comment
      # above (CRITICAL: this volume is mounted ONLY here and in `broker`).
      - approve-sock:/run/approve
      # Workspace-owner-trusted cosmetic/behavior config (serve.json,
      # optionally serve.css) — read-only, same trust tier as the broker's
      # policy bind above (config/serve.json documents every field). NOT
      # the coder-writable /workspaces tree, and deliberately no
      # MRW_STATE_ROOT-style tasks/repositories mount either: `serve` has
      # no worktrees, no tasks/, no repositories/ — nothing to render from
      # the filesystem beyond this, only what the broker sends it over the
      # approve-sock socket.
      - ${MRW_CONFIG_DIR:-../config}:/etc/mrw-serve:ro
    ports:
      # Host-published, localhost-ONLY (the 127.0.0.1 prefix, not just the
      # container-side bind) — this is what actually confines the browser
      # UI to this machine; SERVE_BIND=0.0.0.0 above is safe only because
      # of this line.
      - "127.0.0.1:${MRW_SERVE_PORT:-7787}:7787"
    healthcheck:
      # No curl/wget baked into this image (kept minimal, same posture as
      # reviewer.Dockerfile) — Node itself makes the request. Ready = the
      # HTTP server is actually accepting requests, not merely "process
      # started". /healthz is unauthenticated by design (no token, no
      # state), exactly so this healthcheck needs no session token.
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:7787/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 60s
    command: ["npm", "start"]

  # --------------------------------------------------------------------------
  # egress-proxy: the ONLY path out. Dual-homed on `caged` (to receive the
  # coder's requests) and `egress` (to reach the internet). Enforces the
  # baked-in domain allowlist. Also drops ALL caps — an explicit proxy needs
  # none. The coder cannot reconfigure it: separate container, no exec, no
  # shared capability, config is read-only in the image.
  # --------------------------------------------------------------------------
  egress-proxy:
    build:
      context: ../docker/egress
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - caged
      - egress
    healthcheck:
      # Readiness = squid process is up. (Phase 0 also re-proves reachability
      # from the coder via scripts/egress-selfcheck.sh after start.)
      test: ["CMD-SHELL", "pidof squid >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 4s

networks:
  # Internal: created with NO route to the host/internet. This is the
  # fail-closed primitive. The worker and orchestrator see only this network.
  caged:
    internal: true
  # Normal bridge: the proxy AND the broker are attached, so both have egress.
  # Neither the worker nor the orchestrator is here — neither gets github access.
  egress:
    driver: bridge
  # DELIBERATELY OPENED, docs/devcontainer-status.md item 10: a SECOND
  # `internal: true` network, reaching ONLY the monitoring stack's
  # otel-collector — created OUTSIDE this compose file (idempotently, by
  # scripts/devcontainer-up.sh) so it can be shared with the sibling
  # claude-code-monitoring stack without either repo owning the other's
  # lifecycle. `external: true` here means "attach to a network that must
  # already exist", never "create/manage it from this file".
  #   - No new internet route: still `internal: true`, same fail-closed
  #     primitive as `caged`. The worker/orchestrator/reviewer cages gain
  #     reachability to exactly one extra host (the collector), nothing else.
  #   - broker and egress-proxy do NOT join this network — telemetry
  #     attribution is a coder-session concern, not a publish-path one.
  #   - Fail-open BY DESIGN (unlike the publish/broker path): if the
  #     collector is absent or unreachable, the SDK's OTLP export silently
  #     no-ops — telemetry must never be able to block or slow a step.
  #   - Accepted risk: any of the three cages could send FAKE data or FLOOD
  #     the local collector/Loki (a caged, prompt-injectable process talking
  #     to a network peer it can reach). This is accepted for now because the
  #     blast radius is a local monitoring stack, not the internet or the
  #     publish path — see docs/devcontainer-status.md item 10 for the full
  #     writeup.
  telemetry:
    name: mrw-telemetry
    external: true
  # Thread B (docs/browser-approval.md): the `serve` service's ONLY network.
  # NON-internal (a normal bridge), unlike `caged`/`telemetry` above — the
  # localhost port publish (127.0.0.1:${MRW_SERVE_PORT:-7787}:7787, see the
  # `serve` service) needs a route out to the host, which an
  # `internal: true` network does not provide.
  #   - HONEST tradeoff: this gives `serve` theoretical NAT egress to the
  #     internet (an `internal: true` network cannot have one). Accepted
  #     because `serve` is token-less (holds no secret worth exfiltrating),
  #     has zod-only runtime deps baked into the image at build (no
  #     arbitrary code can land there without a rebuild — serve.Dockerfile),
  #     and its CSP (`default-src 'none'`) confines what the page itself can
  #     fetch/execute in the browser. This is a materially smaller blast
  #     radius than `egress` (below), which is real GitHub push access.
  #   - Neither `broker` nor any cage (`worker`/`orchestrator`/`reviewer`,
  #     all on `caged`) is attached here: `approve` has no route to `caged`,
  #     and `broker` does not need a network for Thread B at all — it talks
  #     to `serve` over the `approve-sock` named volume (below), not TCP.
  approve:
    driver: bridge

volumes:
  # Shared unix-socket carrier between the orchestrator and the broker. A named
  # volume crosses the container boundary on Docker Desktop for macOS where a
  # host-path bind of a unix socket does not. Nothing else lives here.
  broker-sock:
  # Shared unix-socket carrier between the worker's RPC daemon and the
  # orchestrator that drives it. Same named-volume-vs-host-bind reasoning.
  worker-sock:
  # The spine's rw ledger/notes state (MRW_STATE_DIR) — deliberately off the
  # worker-writable tasks/ tree so it cannot be tampered from that cage.
  spine-notes:
  # M3: shared unix-socket carrier between the broker (client) and the
  # reviewer (listener) — same named-volume-vs-host-bind reasoning as
  # broker-sock/worker-sock above.
  reviewer-sock:
  # M3: the broker WRITES ground-truth diff files here (rw); the reviewer
  # reads them read-only. Large-diff channel for the M3 file extension (see
  # broker/src/reviewer.ts's INLINE_THRESHOLD_BYTES — small diffs skip this
  # volume entirely and go inline over the socket).
  review-diffs:
  # Thread B: shared unix-socket carrier between the broker (listener,
  # broker/src/approval-server.ts) and the OPTIONAL `serve` browser-approval
  # UI (client) — same named-volume-vs-host-bind reasoning as broker-sock/
  # worker-sock/reviewer-sock above. CRITICAL: mounted ONLY in `broker` and
  # `serve` — see the `broker` service's BROKER_APPROVAL_SOCKET/volumes
  # comments and docs/browser-approval.md's security invariants for why
  # that must never change.
  approve-sock:
  # NOTE: harness deps are NOT a named volume. A volume layered over the :ro
  # harness bind initializes itself from the HOST's node_modules (darwin
  # binaries, host-uid ownership → npm EACCES; hit live on the first M1 boot).
  # Instead each cage copies the source to container-local disk and installs
  # there — see scripts/prepare-harness-run.sh.
