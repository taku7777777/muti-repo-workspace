# Explicit forward proxy — Phase 0 egress boundary (Approach A).
#
# Domain allowlisting works over the CLEARTEXT CONNECT host, so there is NO TLS
# termination, NO SSL-bump, and NO CA to install in the coder. (TLS 1.3 ECH,
# which can hide the SNI, is irrelevant to an explicit proxy because the
# destination host is in the CONNECT request line.)

http_port 3128

# --- Method / port safety ----------------------------------------------------
acl CONNECT method CONNECT
acl SSL_ports port 443
acl Safe_ports port 443
# Only ever allow CONNECT tunnels to 443. Without this, an allowlisted domain
# could be abused to tunnel to :22 / :25 / etc.
http_access deny CONNECT !SSL_ports
# And for NON-CONNECT (plain http/GET/POST) requests, only allow port 443 too,
# so an allowlisted host cannot be reached on an arbitrary port. Phase 0 traffic
# is all HTTPS; there is no reason to permit any other port.
http_access deny !Safe_ports

# --- Allowlist ---------------------------------------------------------------
# Loaded from a baked-in file. A leading dot matches the domain AND subdomains.
acl allowed_domains dstdomain "/etc/squid/allowlist.txt"
http_access allow allowed_domains

# --- Default deny (everything else) ------------------------------------------
# A denied CONNECT returns 403, which curl reports as a non-zero exit — the
# egress self-check relies on this.
http_access deny all

# --- Minimal footprint: no caching, log to std streams -----------------------
cache deny all
access_log stdio:/dev/stdout
cache_log stdio:/dev/stderr
pid_filename /tmp/squid.pid
coredump_dir /tmp

# Keep the proxy quiet about its own hostname / errors.
visible_hostname egress-proxy
forwarded_for delete
via off
